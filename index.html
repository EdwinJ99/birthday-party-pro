<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kopi 16 Pro - Birthday Party</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Montserrat", sans-serif;
        background-color: #f8f9fa;
        padding: 0;
        box-sizing: border-box;
        overflow-x: hidden; /* Mencegah scroll horizontal saat konfeti muncul */
      }

      .header {
        background-color: #490303;
        color: white;
        text-align: center;
        padding: 20px 15px;
        position: relative;
        z-index: 10; /* Pastikan header di atas konfeti latar */
      }

      .header h2 {
        margin: 0;
        font-weight: 700;
        font-size: 2rem;
      }

      .pdf-viewer {
        width: 100%;
        height: calc(100vh - 160px);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #f8f9fa;
        scroll-behavior: smooth;
        position: relative;
        z-index: 5;
      }

      canvas.pdf-page {
        margin: 20px auto;
        max-width: 95%;
        height: auto;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        display: block;
      }

      /* Loader Cover Full Layar */
      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #f8f9fa; 
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999; /* Paling depan */
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .loading-animation {
        width: 200px;
        height: auto;
        display: block;
        margin: 0 auto;
        animation: run-bounce 0.6s infinite ease-in-out;
      }

      #loader p {
        margin-top: 20px;
        font-weight: 700;
        color: #490303;
        text-align: center;
        font-size: 1.2rem;
      }

      /* Animasi Berlari Kopi */
      @keyframes run-bounce {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(-10px) rotate(-2deg); }
        50% { transform: translateY(0) rotate(0deg); }
        75% { transform: translateY(-10px) rotate(2deg); }
      }

      /* WhatsApp Button */
      .floating-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        background: #f73737;
        color: #fffee3;
        border: none;
        border-radius: 50px;
        padding: 14px 26px;
        font-size: 16px;
        font-weight: 600;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25);
        text-decoration: none;
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .floating-btn:hover {
        background: #490303;
        color: #fff;
        transform: translateY(-2px);
      }

      /* Move Up Button */
      .back-to-top {
        position: fixed;
        bottom: 25px;
        left: 25px;
        background-color: #490303;
        color: #fff;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font-size: 22px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .back-to-top.show {
        opacity: 1;
        visibility: visible;
      }

      .back-to-top:hover {
        background-color: #f73737;
        transform: translateY(-3px);
      }

      /* CSS untuk Canvas Konfeti */
      #confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* Agar tidak menghalangi klik pada menu */
        z-index: 50; /* Di atas PDF, di bawah Loader */
      }
    </style>
  </head>

  <body>
    <canvas id="confetti-canvas"></canvas>

    <header class="header">
      <h2>BIRTHDAY PARTY KOPI 16 PRO</h2>
    </header>

    <div id="loader">
      <img src="static/loading party.png" alt="Loading..." class="loading-animation">
      <p>Loading...</p>
    </div>

    <main class="pdf-viewer" id="pdf-viewer"></main>

    <a
      href="https://api.whatsapp.com/send?phone=6282177881616&text=Kak+mau+reservasi+birtday+party+dong+%F0%9F%98%84"
      target="_blank"
      class="floating-btn"
    >
      <i class="fab fa-whatsapp mr-2"></i> Reservation Now
    </a>

    <a href="#" class="back-to-top" id="backToTop">
      <i class="fa fa-angle-up"></i>
    </a>

    <script>
      function startConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        
        // Atur ukuran canvas sesuai layar
        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const confettiCount = 150; // Jumlah potongan konfeti
        const confetti = [];
        // Warna-warni pesta (kuning, merah muda, biru, hijau)
        const colors = ['#FFD700', '#FF69B4', '#00BFFF', '#32CD32', '#FF4500'];

        for (let i = 0; i < confettiCount; i++) {
          confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height, // Mulai dari atas layar
            r: Math.random() * 6 + 4, // Ukuran radius
            d: Math.random() * confettiCount, // Densitas (untuk variasi kecepatan jatuh)
            color: colors[Math.floor(Math.random() * colors.length)],
            tilt: Math.random() * 10 - 10,
            tiltAngleIncremental: Math.random() * 0.07 + 0.05,
            tiltAngle: 0
          });
        }

        let angle = 0;
        let animationId;

        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          for (let i = 0; i < confettiCount; i++) {
            const p = confetti[i];
            
            // Gambar potongan konfeti
            ctx.beginPath();
            ctx.lineWidth = p.r / 2;
            ctx.strokeStyle = p.color;
            ctx.moveTo(p.x + p.tilt + p.r / 4, p.y);
            ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 4);
            ctx.stroke();

            // Update posisi (fisika jatuh sederhana)
            p.tiltAngle += p.tiltAngleIncremental;
            p.y += (Math.cos(angle + p.d) + 3 + p.r / 2) / 2; // Kecepatan jatuh berdasarkan ukuran
            p.x += Math.sin(angle) * 2; // Goyangan horizontal
            p.tilt = Math.sin(p.tiltAngle) * 15;

            // Jika konfeti keluar dari bawah layar, reset ke atas
            if (p.y > canvas.height + 20) {
              p.x = Math.random() * canvas.width;
              p.y = -20;
              p.tilt = Math.random() * 10 - 10;
            }
          }
          
          angle += 0.01;
          animationId = requestAnimationFrame(draw);
        }

        draw();

        // Berhentikan animasi setelah 5 detik agar tidak membebani performa terus menerus
        setTimeout(() => {
          cancelAnimationFrame(animationId);
          // Perlahan hilangkan canvas agar halus
          canvas.style.transition = 'opacity 1s ease';
          canvas.style.opacity = '0';
          setTimeout(() => {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Bersihkan canvas final
          }, 1000);
        }, 5000); // 5000ms = 5 detik
      }
    </script>

    <script type="module">
      import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs";
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs";

      const url = "static/birthday_party.pdf"; // path PDF
      const container = document.getElementById("pdf-viewer");
      const backToTopBtn = document.getElementById("backToTop");

      // ✅ Progressive streaming
      const loadingTask = pdfjsLib.getDocument({
        url,
        rangeChunkSize: 1048576, // 64KB per chunk
      });

      loadingTask.promise.then(async (pdf) => {
        // Render helper
        const renderPage = async (num) => {
          const page = await pdf.getPage(num);
          const viewport = page.getViewport({ scale: 1.4 });
          const canvas = document.createElement("canvas");
          canvas.className = "pdf-page"; // Tambah class untuk styling CSS
          const context = canvas.getContext("2d");
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          container.appendChild(canvas);
          await page.render({ canvasContext: context, viewport }).promise;
        };

        // Mulai render halaman pertama secepatnya
        await renderPage(1);

        // Paksa loader animasi kopi tampil selama minimal 1 detik
        setTimeout(() => {
          const loader = document.getElementById("loader");
          if (loader) {
            loader.style.transition = "opacity 0.5s ease";
            loader.style.opacity = "0";
            setTimeout(() => {
              loader.remove(); // Hapus loader dari layar
              
              // 🚀 MULAI ANIMASI KONFETI DI SINI 🚀
              startConfetti();
              
            }, 500); // Waktu fade out
          }
        }, 1000); // 1000ms = 1 detik

        // Lazy load halaman sisanya (halaman 2 dan seterusnya)
        for (let i = 2; i <= pdf.numPages; i++) {
          setTimeout(() => renderPage(i), 400 * (i - 1));
        }
      });

      // Tombol scroll ke atas
      container.addEventListener("scroll", () => {
        if (container.scrollTop > 300) {
          backToTopBtn.classList.add("show");
        } else {
          backToTopBtn.classList.remove("show");
        }
      });

      backToTopBtn.addEventListener("click", (e) => {
        e.preventDefault();
        container.scrollTo({ top: 0, behavior: "smooth" });
      });
    </script>
  </body>
</html>
